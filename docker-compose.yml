services:
  # --- Veritabanı ---
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fuira_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Cache & Session (Redis) ---
  redis:
    image: redis:alpine
    container_name: ecommerce_redis
    restart: always
    ports:
      - "6379:6379"

  # --- Backend ---
  storebackend:
    build: ./storebackend
    container_name: node_storebackend
    ports:
      - "5000:5000"
    volumes:
      - ./storebackend:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/fuira_ecommerce
      - REDIS_URL=redis://redis:6379

  # --- Frontend Servisleri ---
  storefront:
    build: ./frontend
    container_name: react_storefront
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:storefront

  admin:
    build: ./frontend
    container_name: react_admin
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:admin

  vendorpanel:
    build: ./frontend
    container_name: react_vendor
    ports:
      - "5175:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:vendor

  # --- Proxy ---
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - storefront
      - admin
      - vendorpanel
      - storebackend

volumes:
  postgres_data: