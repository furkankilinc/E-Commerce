services:
  # --- Veritabanı ---
  db:
    image: postgres:16-alpine
    container_name: postgres_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: fuira_ecommerce
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # --- Cache & Session (Redis) ---
  redis:
    image: redis:alpine
    container_name: ecommerce_redis
    restart: always
    ports:
      - "6379:6379"

  # --- Log Yönetimi (Seq) ---
  seq:
    image: datalust/seq:latest
    container_name: ecommerce_seq
    restart: always
    ports:
      - "5341:80"    # Web UI → http://localhost:5341
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=Y
    volumes:
      - seq_data:/data

  # --- Backend ---
  storebackend:
    build: ./storebackend
    container_name: node_storebackend
    ports:
      - "5000:5000"
    volumes:
      - ./storebackend:/app
      - /app/node_modules
    depends_on:
      - db
      - redis
      - seq
    environment:
      - DATABASE_URL=postgresql://postgres:password123@db:5432/fuira_ecommerce
      - REDIS_URL=redis://redis:6379
      - JWT_USER_SECRET=fuira_user_jwt_s3cr3t_2026_change_in_production
      - JWT_MERCHANT_SECRET=fuira_merchant_jwt_s3cr3t_2026_change_in_production
      - JWT_ADMIN_SECRET=fuira_admin_jwt_s3cr3t_2026_change_in_production
      - CORS_ORIGINS=http://localhost,http://127.0.0.1,http://user.fuira.com,http://admin.fuira.com,http://merchant.fuira.com,http://user.fuira.com:80,http://admin.fuira.com:80,http://merchant.fuira.com:80,http://localhost:5173,http://localhost:5174,http://localhost:5175
      - SEQ_URL=http://seq:80

  # --- Frontend Servisleri ---
  storefront:
    build: ./frontend
    container_name: react_storefront
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:storefront

  admin:
    build: ./frontend
    container_name: react_admin
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:admin

  vendorpanel:
    build: ./frontend
    container_name: react_vendor
    ports:
      - "5175:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:vendor

  # --- Proxy ---
  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - storefront
      - admin
      - vendorpanel
      - storebackend

  # --- Object Storage (MinIO) ---
  minio:
    image: minio/minio:latest
    container_name: ecommerce_minio
    ports:
      - "9090:9000"
      - "9091:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
  seq_data:
