services:
  # --- Databases (Database per Service) ---
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_USER: ${AUTH_DB_USER}
      POSTGRES_PASSWORD: ${AUTH_DB_PASSWORD}
      POSTGRES_DB: ${AUTH_DB_NAME}
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "${AUTH_DB_PORT}:5432"

  product-db:
    image: postgres:16-alpine
    container_name: product-db
    restart: always
    environment:
      POSTGRES_USER: ${PRODUCT_DB_USER}
      POSTGRES_PASSWORD: ${PRODUCT_DB_PASSWORD}
      POSTGRES_DB: ${PRODUCT_DB_NAME}
    volumes:
      - product_db_data:/var/lib/postgresql/data
    ports:
      - "${PRODUCT_DB_PORT}:5432"

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    restart: always
    environment:
      POSTGRES_USER: ${ORDER_DB_USER}
      POSTGRES_PASSWORD: ${ORDER_DB_PASSWORD}
      POSTGRES_DB: ${ORDER_DB_NAME}
    volumes:
       - order_db_data:/var/lib/postgresql/data
    ports:
      - "${ORDER_DB_PORT}:5432"

  # --- Infrastructure ---
  redis:
    image: redis:alpine
    container_name: cache-redis
    ports:
      - "${REDIS_PORT}:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: message-broker
    ports:
      - "${RABBITMQ_PORT}:5672"
      - "${RABBITMQ_MGMT_PORT}:15672"

#  seq:
#    image: datalust/seq:latest
#    container_name: log-server
#    restart: always
#    environment:
#      - ACCEPT_EULA=Y
#      - SEQ_API_AUTH_ENABLED=false
#    ports:
#      - "5341:80"
#    volumes:
#      - seq_data_yeni:/data


  minio:
    image: minio/minio:latest
    container_name: object-storage
    ports:
      - "${MINIO_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # --- Management Tools ---
  homer:
    image: b4bz/homer
    container_name: central-dashboard
    volumes:
      - ./homer:/www/assets
    ports:
      - "${HOMER_PORT}:8080"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: docker-manager
    ports:
      - "${PORTAINER_PORT}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  # --- Microservices ---
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    depends_on:
      - auth-db
      - rabbitmq
    ports:
      - "${AUTH_SERVICE_PORT}:${AUTH_SERVICE_PORT}"
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=${AUTH_SERVICE_DB_URL}
      - JWT_SECRET=${AUTH_SERVICE_JWT_SECRET}
      - JWT_REFRESH_SECRET=${AUTH_SERVICE_JWT_REFRESH_SECRET}
      - PORT=${AUTH_SERVICE_PORT}

  product-service:
    build: ./services/product-service
    container_name: product-service
    depends_on:
      - product-db
      - rabbitmq
      - minio
    ports:
      - "${PRODUCT_SERVICE_PORT}:${PRODUCT_SERVICE_PORT}"
    volumes:
      - ./services/product-service:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=${PRODUCT_SERVICE_DB_URL}
      - JWT_SECRET=${PRODUCT_SERVICE_JWT_SECRET}
      - PORT=${PRODUCT_SERVICE_PORT}
      - MINIO_ENDPOINT=${PRODUCT_SERVICE_MINIO_ENDPOINT}
      - MINIO_PORT=${PRODUCT_SERVICE_MINIO_PORT}
      - MINIO_ACCESS_KEY=${PRODUCT_SERVICE_MINIO_ACCESS_KEY}
      - MINIO_SECRET_KEY=${PRODUCT_SERVICE_MINIO_SECRET_KEY}
      - MINIO_BUCKET=${PRODUCT_SERVICE_MINIO_BUCKET}
      - MINIO_PUBLIC_URL=${PRODUCT_SERVICE_MINIO_PUBLIC_URL}

  order-service:
    build: ./services/order-service
    container_name: order-service
    depends_on:
      - order-db
      - rabbitmq
    ports:
      - "${ORDER_SERVICE_PORT}:${ORDER_SERVICE_PORT}"
    volumes:
      - ./services/order-service:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=${ORDER_SERVICE_DB_URL}
      - REDIS_URL=${ORDER_SERVICE_REDIS_URL}
      - JWT_SECRET=${ORDER_SERVICE_JWT_SECRET}
      - PORT=${ORDER_SERVICE_PORT}

  # --- Frontend Applications ---
  storefront:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-storefront
    ports:
      - "${STOREFRONT_PORT}:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev:storefront
    depends_on:
      - auth-service
      - product-service

  admin:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-admin
    ports:
      - "${ADMIN_PORT}:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev:admin
    depends_on:
      - auth-service

  vendorpanel:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-vendor
    ports:
      - "${VENDORPANEL_PORT}:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev:vendor
    depends_on:
      - auth-service
      - product-service

  # --- API Gateway (Nginx) ---
  nginx-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "${API_GATEWAY_PORT}:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service

volumes:
  auth_db_data:
  product_db_data:
  order_db_data:
  portainer_data:
#  seq_data_yeni:
  minio_data:
