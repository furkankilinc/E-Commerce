services:
  storefront:
    build: ./frontend
    container_name: react_storefront
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:storefront

  admin:
    build: ./frontend
    container_name: react_admin
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:admin

  vendorpanel:
    build: ./frontend
    container_name: react_vendor
    ports:
      - "5175:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - storebackend
    command: npm run dev:vendor

  storebackend:
    build: ./storebackend
    container_name: node_storebackend
    ports:
      - "5000:5000"
    volumes:
      - ./storebackend:/app
      - /app/node_modules

  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - storefront
      - admin
      - vendorpanel
      - storebackend
