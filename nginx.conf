map $http_origin $cors_origin_matched {
    default 'http://localhost:5173';
    'http://localhost:5173' 'http://localhost:5173';
    'http://localhost:5174' 'http://localhost:5174';
    'http://localhost:5175' 'http://localhost:5175';
}

server {
    listen 80;
    server_name localhost api-gateway;

    absolute_redirect off;
    port_in_redirect off;

    resolver 127.0.0.11 valid=30s;

    # CORS Headers Helper
    set $cors_origin $cors_origin_matched;

    # Ortak CORS Ayarlarını Her Location İçinde Kullanacağız
    # --- Auth Service ---
    location ~ ^/api/auth {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-cart-id' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-cart-id' always;
            add_header 'Access-Control-Max-Age' 1728000;
            return 204;
        }

        set $upstream_auth auth-service;
        proxy_pass http://$upstream_auth:5001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # --- Admin Routes ---
    location ~ ^/api/admin {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
        
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization' always;
            return 204;
        }

        set $upstream_auth auth-service;
        set $upstream_product product-service;
        set $upstream_order order-service;

        if ($request_uri ~* "/api/admin/(users|merchants)") {
            proxy_pass http://$upstream_auth:5001;
        }
        if ($request_uri ~* "/api/admin/(stats|products|categories|attributes)") {
            proxy_pass http://$upstream_product:5002;
        }
        if ($request_uri ~* "/api/admin/orders") {
            proxy_pass http://$upstream_order:5003;
        }
    }

   # --- Product & Catalog Service ---
       location ~ ^/api/(products|categories|products-meta|attributes|reviews|merchant/products|merchant/stats) {
           add_header 'Access-Control-Allow-Origin' $cors_origin always;
           add_header 'Access-Control-Allow-Credentials' 'true' always;
           add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
           add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-cart-id,x-wishlist-id' always;

           if ($request_method = 'OPTIONS') {
               add_header 'Access-Control-Allow-Origin' $cors_origin always;
               add_header 'Access-Control-Allow-Credentials' 'true' always;
               add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
               add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-cart-id,x-wishlist-id' always;
               return 204;
           }

           set $upstream_product product-service;
           proxy_pass http://$upstream_product:5002;

           # BU 4 SATIRI EKLEDİM, ASIL OLAY BURADA:
           proxy_http_version 1.1;
           proxy_set_header Host $host;
           proxy_set_header X-Real-IP $remote_addr;
           proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
           proxy_set_header X-Forwarded-Proto $scheme;
       }

    # --- Order & Cart Service ---
    location ~ ^/api/(orders|cart|wishlist|collections|merchant/orders) {
        add_header 'Access-Control-Allow-Origin' $cors_origin always;
        add_header 'Access-Control-Allow-Credentials' 'true' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
        add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-cart-id,x-wishlist-id' always;

        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' $cors_origin always;
            add_header 'Access-Control-Allow-Credentials' 'true' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,X-CustomHeader,Keep-Alive,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Authorization,x-cart-id,x-wishlist-id' always;
            return 204;
        }

        set $upstream_order order-service;
        proxy_pass http://$upstream_order:5003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
    }

    # --- Fallback ---
    location /api/upload {
        proxy_pass http://product-service:5002;
        proxy_set_header Host $host;
    }

    location / {
        proxy_pass http://central-dashboard:8080/;
        proxy_set_header Host $host;
    }
}