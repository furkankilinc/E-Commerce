services:
  # --- Databases (Database per Service) ---
  auth-db:
    image: postgres:16-alpine
    container_name: auth-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: auth_db
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  product-db:
    image: postgres:16-alpine
    container_name: product-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: product_db
    volumes:
      - product_db_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  order-db:
    image: postgres:16-alpine
    container_name: order-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: order_db
    volumes:
       - order_db_data:/var/lib/postgresql/data
    ports:
      - "5435:5432"

  # --- Database Management (Prisma Studios) ---
  auth-studio:
    image: node:20-alpine
    container_name: auth-studio
    working_dir: /app
    volumes:
      - ./services/auth-service:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password123@auth-db:5432/auth_db
    ports:
      - "5551:5555"
    command: npx prisma studio --browser none --schema ./prisma/schema.prisma --port 5555
    depends_on:
      - auth-db

  product-studio:
    image: node:20-alpine
    container_name: product-studio
    working_dir: /app
    volumes:
      - ./services/product-service:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password123@product-db:5432/product_db
    ports:
      - "5552:5555"
    command: npx prisma studio --browser none --schema ./prisma/schema.prisma --port 5555
    depends_on:
      - product-db

  order-studio:
    image: node:20-alpine
    container_name: order-studio
    working_dir: /app
    volumes:
      - ./services/order-service:/app
    environment:
      - DATABASE_URL=postgresql://postgres:password123@order-db:5432/order_db
    ports:
      - "5553:5555"
    command: npx prisma studio --browser none --schema ./prisma/schema.prisma --port 5555
    depends_on:
      - order-db

  # --- Infrastructure ---
  redis:
    image: redis:alpine
    container_name: cache-redis
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: message-broker
    ports:
      - "5672:5672"
      - "15672:15672"

#  seq:
#    image: datalust/seq:latest
#    container_name: log-server
#    restart: always
#    environment:
#      - ACCEPT_EULA=Y
#      - SEQ_API_AUTH_ENABLED=false
#    ports:
#      - "5341:80"
#    volumes:
#      - seq_data_yeni:/data


  minio:
    image: minio/minio:latest
    container_name: object-storage
    ports:
      - "9000:9000"
      - "9091:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  # --- Management Tools ---
  homer:
    image: b4bz/homer
    container_name: central-dashboard
    volumes:
      - ./homer:/www/assets
    ports:
      - "8080:8080"

  portainer:
    image: portainer/portainer-ce:latest
    container_name: docker-manager
    ports:
      - "9443:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data

  # --- Microservices ---
  auth-service:
    build: ./services/auth-service
    container_name: auth-service
    depends_on:
      - auth-db
      - rabbitmq
    ports:
      - "5001:5001"
    volumes:
      - ./services/auth-service:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:password123@auth-db:5432/auth_db
      - JWT_SECRET=auth_secret_key
      - JWT_REFRESH_SECRET=auth_refresh_secret_key
      - PORT=5001

  product-service:
    build: ./services/product-service
    container_name: product-service
    depends_on:
      - product-db
      - rabbitmq
      - minio
    ports:
      - "5002:5002"
    volumes:
      - ./services/product-service:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:password123@product-db:5432/product_db
      - JWT_SECRET=auth_secret_key
      - PORT=5002
      - MINIO_ENDPOINT=object-storage
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
      - MINIO_BUCKET=products
      - MINIO_PUBLIC_URL=http://localhost:9000

  order-service:
    build: ./services/order-service
    container_name: order-service
    depends_on:
      - order-db
      - rabbitmq
    ports:
      - "5003:5003"
    volumes:
      - ./services/order-service:/app
      - /app/node_modules
    environment:
      - DATABASE_URL=postgresql://postgres:password123@order-db:5432/order_db
      - REDIS_URL=redis://cache-redis:6379
      - JWT_SECRET=auth_secret_key
      - PORT=5003

  # --- Frontend Applications ---
  storefront:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-storefront
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev:storefront
    depends_on:
      - auth-service
      - product-service

  admin:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-admin
    ports:
      - "5174:5174"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev:admin
    depends_on:
      - auth-service

  vendorpanel:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    container_name: react-vendor
    ports:
      - "5175:5175"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev:vendor
    depends_on:
      - auth-service
      - product-service

  # --- API Gateway (Nginx) ---
  nginx-gateway:
    image: nginx:alpine
    container_name: api-gateway
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - product-service
      - order-service

volumes:
  auth_db_data:
  product_db_data:
  order_db_data:
  portainer_data:
#  seq_data_yeni:
  minio_data:
