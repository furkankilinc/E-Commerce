# Production Nginx Configuration
# Serves built files from storefront, admin, and vendor-panel

# Storefront App (user.fuira.com)
server {
    listen 80;
    server_name user.fuira.com localhost;

    root /usr/share/nginx/html/storefront;
    index index.html;

    # Support for React Router (Single Page App)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://prod-backend:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}

